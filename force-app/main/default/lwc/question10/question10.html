<template>
    <lightning-card title="Check are you 18 or not">
        <div class="slds-p-around_medium">
            <lightning-input type="checkbox" label="Are you 18?" onchange={handleCheckboxChange}></lightning-input>
        </div>
        <div class="slds-p-around_medium">
            <template if:true={isChecked}>
                <p><strong>Name: Sanjay Gupta</strong></p>
                <p><strong>Email: sgts@gmail.com</strong></p>
                <p><strong>Phone: 9876543210</strong></p>
                <p><strong>Address: 123 jagathpura, Jaipur, India</strong></p>
            </template>
            <template if:false={isChecked}>
                <p><strong>Sorry, you are not 18 or older.</strong></p>
            </template>
        </div>
    </lightning-card>
</template>
