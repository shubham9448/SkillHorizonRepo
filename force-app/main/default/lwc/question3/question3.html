<template>
    <lightning-card title="Copy Billing to Shipping Address">
        <div class="slds-p-around_medium">
            <p>This component copies billing address information to the shipping address.</p>
            <br/>
            <lightning-input label="Billing Address" onchange={handleBillingAddressChange}></lightning-input>
            <lightning-input label="Shipping Address" value={shippingAddress}></lightning-input>
        </div>
        <div class="slds-align_absolute-center">
            <lightning-button label="Copy Billing to Shipping" onclick={copyBillingToShipping} type="button" variant="brand"></lightning-button>
        </div>
    </lightning-card>
</template>
